// ===== src/shell.jsx =====
// Shell: doc frame, side-nav, section wrapper, shared primitives

const SECTIONS = [
  { id: 'intro', label: '00  Context & reasoning' },
  { id: 'visuals', label: '01  Visual direction — 3 aesthetics' },
  { id: 'homepage', label: '02  Homepage / dashboard' },
  { id: 'plant', label: '03  Plant overview as nav' },
  { id: 'quiz', label: '04  Quiz mode' },
  { id: 'mastery', label: '05  Mastery dashboard' },
  { id: 'setpoints', label: '06  Setpoint cheat sheets' },
  { id: 'nav', label: '07  Sidebar + ⌘K palette' },
  { id: 'mobile', label: '08  Mobile quick-study' },
  { id: 'next', label: '09  Where to next' },
];

function DocShell({ children }) {
  const [active, setActive] = React.useState('intro');
  const [navOpen, setNavOpen] = React.useState(true);

  React.useEffect(() => {
    // persist scroll position / active section
    const saved = localStorage.getItem('salem-doc-active');
    if (saved) setActive(saved);
  }, []);

  React.useEffect(() => {
    localStorage.setItem('salem-doc-active', active);
    const el = document.getElementById(`sec-${active}`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, [active]);

  // IntersectionObserver to update active on scroll
  React.useEffect(() => {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting && e.intersectionRatio > 0.3) {
          const id = e.target.id.replace('sec-', '');
          setActive(id);
        }
      });
    }, { threshold: [0.3, 0.5, 0.7] });
    SECTIONS.forEach(s => {
      const el = document.getElementById(`sec-${s.id}`);
      if (el) obs.observe(el);
    });
    return () => obs.disconnect();
  }, []);

  return (
    <div style={{ display: 'flex', minHeight: '100vh' }}>
      <aside style={{
        width: navOpen ? 260 : 48,
        borderRight: '1px solid var(--doc-line)',
        background: '#fafaf7',
        position: 'sticky',
        top: 0,
        height: '100vh',
        overflowY: 'auto',
        transition: 'width 160ms ease',
        flexShrink: 0,
      }}>
        <div style={{ padding: navOpen ? '24px 20px 16px' : '20px 12px', borderBottom: '1px solid var(--doc-line)' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            {navOpen && (
              <div>
                <div style={{ fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--doc-muted)', fontWeight: 500 }}>Design exploration</div>
                <div style={{ fontFamily: 'Instrument Serif', fontSize: 22, lineHeight: 1.15, marginTop: 4 }}>Salem Study Wiki</div>
              </div>
            )}
            <button
              onClick={() => setNavOpen(!navOpen)}
              style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--doc-muted)', fontSize: 18, padding: 4 }}
              aria-label="Toggle nav"
            >{navOpen ? '‹' : '›'}</button>
          </div>
        </div>
        {navOpen && (
          <nav style={{ padding: '12px 12px 40px' }}>
            {SECTIONS.map(s => (
              <a
                key={s.id}
                href={`#sec-${s.id}`}
                onClick={(e) => { e.preventDefault(); setActive(s.id); }}
                style={{
                  display: 'block',
                  padding: '7px 10px',
                  fontSize: 13,
                  color: active === s.id ? 'var(--doc-ink)' : 'var(--doc-muted)',
                  fontWeight: active === s.id ? 600 : 400,
                  textDecoration: 'none',
                  borderRadius: 4,
                  background: active === s.id ? 'rgba(184,66,14,0.08)' : 'transparent',
                  borderLeft: active === s.id ? '2px solid var(--doc-accent)' : '2px solid transparent',
                  marginBottom: 2,
                  fontVariantNumeric: 'tabular-nums',
                }}
              >{s.label}</a>
            ))}
            <div style={{ marginTop: 32, padding: '0 10px', fontSize: 11, color: 'var(--doc-muted)', lineHeight: 1.55 }}>
              <div style={{ textTransform: 'uppercase', letterSpacing: '0.12em', fontSize: 9, color: '#9a9a9a', marginBottom: 6 }}>Note</div>
              These are design explorations, not a finished build. Mix & match the pieces you like and I'll converge to a coherent v1.
            </div>
          </nav>
        )}
      </aside>
      <main style={{ flex: 1, minWidth: 0 }} data-screen-label="Design Doc">
        {children}
      </main>
    </div>
  );
}

function Section({ id, eyebrow, title, subtitle, children }) {
  return (
    <section
      id={`sec-${id}`}
      data-screen-label={`${id}`}
      style={{ padding: '80px 64px 120px', maxWidth: 1400, borderBottom: '1px solid var(--doc-line)' }}
    >
      <div style={{ fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--doc-accent)', fontWeight: 600, marginBottom: 10 }}>
        {eyebrow}
      </div>
      <h2 style={{ fontFamily: 'Instrument Serif', fontSize: 48, fontWeight: 400, lineHeight: 1.05, margin: '0 0 12px', letterSpacing: '-0.01em' }}>{title}</h2>
      {subtitle && (
        <p style={{ fontSize: 17, color: '#4a4a4a', maxWidth: 720, lineHeight: 1.55, margin: '0 0 40px' }}>{subtitle}</p>
      )}
      {children}
    </section>
  );
}

function Note({ label = 'Note', children, tone = 'default' }) {
  const colors = {
    default: { bg: '#efece5', ink: '#2a2a2a', accent: '#8a7a5a' },
    warn: { bg: '#fbf2e5', ink: '#4a3010', accent: '#b8420e' },
    good: { bg: '#eaf2ea', ink: '#1a3a1a', accent: '#4a7a3a' },
  }[tone];
  return (
    <div style={{
      background: colors.bg,
      borderLeft: `2px solid ${colors.accent}`,
      padding: '14px 18px',
      borderRadius: '0 4px 4px 0',
      margin: '16px 0',
      fontSize: 14,
      lineHeight: 1.6,
      color: colors.ink,
    }}>
      <div style={{ fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: colors.accent, fontWeight: 600, marginBottom: 4 }}>{label}</div>
      {children}
    </div>
  );
}

function Stack({ children, gap = 16, style }) {
  return <div style={{ display: 'flex', flexDirection: 'column', gap, ...style }}>{children}</div>;
}

function Row({ children, gap = 16, align = 'stretch', wrap = false, style }) {
  return <div style={{ display: 'flex', gap, alignItems: align, flexWrap: wrap ? 'wrap' : 'nowrap', ...style }}>{children}</div>;
}

function OptionCard({ title, subtitle, tag, children, minHeight = 0 }) {
  return (
    <div style={{
      background: '#ffffff',
      border: '1px solid var(--doc-line)',
      borderRadius: 6,
      overflow: 'hidden',
      display: 'flex',
      flexDirection: 'column',
      minHeight,
    }}>
      <div style={{ padding: '14px 18px', borderBottom: '1px solid var(--doc-line)', display: 'flex', alignItems: 'baseline', gap: 12 }}>
        {tag && <span style={{ fontSize: 10, letterSpacing: '0.14em', fontWeight: 700, color: 'var(--doc-accent)', textTransform: 'uppercase' }}>{tag}</span>}
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 15, fontWeight: 600, lineHeight: 1.2 }}>{title}</div>
          {subtitle && <div style={{ fontSize: 13, color: 'var(--doc-muted)', marginTop: 2 }}>{subtitle}</div>}
        </div>
      </div>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
        {children}
      </div>
    </div>
  );
}

// Scaled viewport — show a design at real pixel size but scaled to fit
function ScaledFrame({ width = 1400, height = 900, children, bg = '#0a0e17' }) {
  const wrapRef = React.useRef(null);
  const [scale, setScale] = React.useState(1);
  React.useEffect(() => {
    const update = () => {
      if (!wrapRef.current) return;
      const w = wrapRef.current.clientWidth;
      setScale(Math.min(1, w / width));
    };
    update();
    const ro = new ResizeObserver(update);
    if (wrapRef.current) ro.observe(wrapRef.current);
    return () => ro.disconnect();
  }, [width]);
  return (
    <div ref={wrapRef} style={{ width: '100%', height: height * scale, position: 'relative', background: bg, overflow: 'hidden', borderRadius: 4 }}>
      <div style={{
        width,
        height,
        transform: `scale(${scale})`,
        transformOrigin: 'top left',
        position: 'absolute',
        top: 0,
        left: 0,
      }}>
        {children}
      </div>
    </div>
  );
}

Object.assign(window, { DocShell, Section, Note, Stack, Row, OptionCard, ScaledFrame, SECTIONS });

            <div style={{ fontSize: 12, color: '#6a5c42', marginTop: 12, maxWidth: 280 }}>{label}</div>
          </div>
        ))}
      </Row>
      <Note label="Principle" tone="default">
        Mobile is not "desktop, shrunk." It's its own surface. Articles on mobile default to the <b>setpoint table + mastery</b> pane first — text is there, but the big win for phone use is fast setpoint check + a 5-question drill. Long reading is desk behaviour.
      </Note>
    </Section>
  );
}

Object.assign(window, { MobileSection });
