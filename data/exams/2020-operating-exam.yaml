scenarios:
  - number: 1
    title: "Power Ascension / Station Blackout"
    pages: "281-316"
    num_events: 6
    num_critical_tasks: 2
    eops_entered:
      - EOP-TRIP-1
      - EOP-LOPA-1
    abnormals_entered:
      - AB.CVC-0001
      - AB.CW-0001
      - AB.LOOP-0003
      - AB.LOAD-0001
      - AB.LOOP-0001
    critical_tasks:
      - id: "CT-24"
        description: "Energize at least one AC emergency bus before transition out of EOP-LOPA-1"
        time_critical: false
      - id: "CT-25"
        description: "Manually start one SW pump for EDG cooling before transition out of EOP-LOPA-1"
        time_critical: false
  - number: 2
    title: "Load Reduction / LBLOCA / Loss of Emergency Recirculation"
    pages: "317-358"
    num_events: 7
    num_critical_tasks: 3
    eops_entered:
      - EOP-TRIP-1
      - EOP-LOCA-1
      - EOP-LOCA-5
    abnormals_entered:
      - AB.COND-0001
      - AB.ROD-0003
      - AB.RC-0001
    critical_tasks:
      - id: "CT-2"
        description: "Manually actuate SI before transition out of EOP-TRIP-1"
        time_critical: false
      - id: "CT-5"
        description: "Manually start one low head ECCS pump before transition out of EOP-TRIP-1"
        time_critical: false
      - id: "CT-29"
        description: "Makeup to RWST and minimize RWST outflow before ECCS pumps cavitate"
        time_critical: false
  - number: 3
    title: "ATWS / Feedwater Line Break"
    pages: "359-394"
    num_events: 7
    num_critical_tasks: 2
    eops_entered:
      - EOP-TRIP-1
      - EOP-LOSC-1
      - EOP-TRIP-3
    abnormals_entered:
      - AB.CVC-0001
      - AB.SW-0001
      - AB.CN-0001
      - AB.LOAD-0001
    critical_tasks:
      - id: "CT-1"
        description: "Manually trip reactor before transition to EOP-FRSM-1 is required"
        time_critical: false
      - id: "CT-17"
        description: "Isolate feed and steam flow to faulted SG before transition out of EOP-LOSC-1"
        time_critical: false
  - number: 4
    title: "SGTR / PORV Failure"
    pages: "395-431"
    num_events: 8
    num_critical_tasks: 3
    eops_entered:
      - EOP-TRIP-1
      - EOP-TRIP-2
      - EOP-SGTR-1
    abnormals_entered:
      - AB.RAD-0001
      - AB.CN-0001
      - AB.RCP-0001
      - AB.SG-0001
    critical_tasks:
      - id: "CT-18"
        description: "Isolate feed and steam flow to ruptured SG before transition to SGTR-3"
        time_critical: true
        time_windows:
          - action: "Isolate feed flow (close 21AF21 and 21AF11)"
            limit_minutes: 10
      - id: "CT-19"
        description: "Control initial RCS cooldown so that transition from SGTR-1 does not occur"
        time_critical: false
      - id: "CT-10"
        description: "Close PZR PORV block valve of stuck open PZR PORV"
        time_critical: false
  - number: 5
    title: "Loss of Heat Sink / Condensate Recovery"
    pages: "432-463"
    num_events: 8
    num_critical_tasks: 2
    eops_entered:
      - EOP-TRIP-1
      - EOP-FRHS-1
    abnormals_entered:
      - AB.ROD-0003
      - AB.4KV-0002
    critical_tasks:
      - id: "CT-13"
        description: "Manually trip the turbine before severe challenge to subcriticality or integrity CFST"
        time_critical: false
      - id: "CT-43"
        description: "Establish feedwater flow into at least one SG before bleed and feed is required"
        time_critical: false
