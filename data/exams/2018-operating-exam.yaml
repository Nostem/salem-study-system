scenarios:
  - number: 1
    title: "Startup / PZR Pressure Channel Failure / SW Bay Leak / RCP Seal Failure / SGTR"
    pages: "229-269"
    num_events: 5
    num_critical_tasks: 2
    eops_entered:
      - EOP-TRIP-1
      - EOP-TRIP-2
      - EOP-SGTR-1
    abnormals_entered:
      - AB.PZR-0001
      - AB.SW-0003
      - AB.RCP-0001
      - AB.RAD-0001
    critical_tasks:
      - id: "CT-Site-Specific"
        description: "Stop 22 RCP and close 22CV104 within 3-5 minutes after stopping 22 RCP"
        time_critical: true
        time_windows:
          - action: "Close 22CV104"
            limit_minutes: 5.0
      - id: "CT-19"
        description: "Control initial RCS cooldown so that transition from EOP-SGTR-1 does not occur"
        time_critical: false

  - number: 2
    title: "MS167 Drift / Tavg Channel Failure / RCS Leak / LBLOCA"
    pages: "270-306"
    num_events: 7
    num_critical_tasks: 2
    eops_entered:
      - EOP-TRIP-1
      - EOP-LOCA-1
      - EOP-LOCA-3
      - EOP-FRTS-1
    abnormals_entered:
      - AB.ROD-0003
      - AB.RC-0001
      - AB.RAD-0001
      - AB.LOAD-0001
    critical_tasks:
      - id: "CT-2"
        description: "Manually actuate SI before transition to EOP-LOCA-1, EOP-FRTS-1, or EOP-TRIP-2"
        time_critical: false
      - id: "CT-36"
        description: "Transfer to cold leg recirculation before RWST level drops below 1.2 feet"
        time_critical: true
        time_windows:
          - action: "Close 2SJ69"
            limit_minutes: 3.7
          - action: "Stop 22 CS pump"
            limit_minutes: 5.5
          - action: "ECCS in recirculation (LOCA-3 Step 15)"
            limit_minutes: 11.2
