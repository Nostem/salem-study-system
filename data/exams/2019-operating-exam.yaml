scenarios:
  - number: 1
    title: "Power Ascension / LOCA Outside Containment"
    esg: "ESG-1"
    nrc_id: "NRC-1"
    pages: "234-270"
    num_events: 7
    num_critical_tasks: 2
    initial_conditions: "IC-256: 4% power, BOL"
    eops_entered:
      - EOP-TRIP-1
      - EOP-TRIP-2
      - EOP-LOCA-6
      - EOP-LOCA-1
      - EOP-TRIP-3
    abnormals_entered:
      - AB.PZR-0001
      - AB.CHEM-0001
      - AB.CW-0001
      - AB.RCP-0001
    critical_tasks:
      - id: "CT-2"
        description: "Manually actuate SI before transition out of EOP-TRIP-1"
        time_critical: false
      - id: "CT-32"
        description: "Isolate LOCA outside containment before transition out of EOP-LOCA-6"
        time_critical: false

  - number: 3
    title: "ATWS / Stuck-Open PORV"
    esg: "ESG-3"
    nrc_id: "NRC-3"
    pages: "271-305"
    num_events: 8
    num_critical_tasks: 2
    initial_conditions: "IC-258: 89.5% power, MOL"
    eops_entered:
      - EOP-TRIP-1
      - EOP-FRSM-1
      - EOP-TRIP-2
    abnormals_entered:
      - AB.COND-0001
      - AB.LOAD-0001
    critical_tasks:
      - id: "CT-52"
        description: "Insert negative reactivity into the core prior to dispatching operators to locally trip the reactor"
        time_critical: false
      - id: "CT-10"
        description: "Close PZR PORV block valve by completion of Step 9 of TRIP-2"
        time_critical: false

  - number: 4
    title: "SGFP Trip / Loss of Heat Sink"
    esg: "ESG-5"
    nrc_id: "NRC-4"
    pages: "306-346"
    num_events: 6
    num_critical_tasks: 2
    initial_conditions: "IC-260: 88% power, MOL"
    eops_entered:
      - EOP-TRIP-1
      - EOP-TRIP-2
      - EOP-FRHS-1
    abnormals_entered:
      - AB.PZR-0001
      - AB.NIS-0001
      - AB.CN-0001
    critical_tasks:
      - id: "CT-1"
        description: "Trip the reactor prior to a transition to FRSM-1 being required"
        time_critical: false
      - id: "CT-43"
        description: "Establish main feedwater flow to SGs before bleed and feed is required"
        time_critical: false
